version: "2"
type: frontend
tech_stack:
  - HTML
  - CSS
  - JavaScript
routes:
  - path: /index.html
    file: src/main/resources/static/index.html
    auth_required: false
    description: User login page
  - path: /admin.html
    file: src/main/resources/static/admin.html
    auth_required: true
    description: Admin dashboard
features:
  - name: User Login
    description: Login with email and password credentials
    files:
      - src/main/resources/static/index.html
      - src/main/resources/static/js/main.js
    entry_route: /index.html
    user_interactions:
      - Fill email input field (#login-email)
      - Fill password input field (#login-password)
      - Click Login button to submit
    api_calls:
      - method: POST
        endpoint: /api/auth/login
    auth_required: false
known_limitations: []
