<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Inventarios - Login</title>
    <link rel="icon" type="image/jpeg" href="images/LOGO%20SISTEMA.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Login Container -->
    <div class="login-container" id="login-container">
        <img src="images/LOGO%20SISTEMA.jpg" alt="Logo"
            style="width: 90px; height: auto; border-radius: 10px; margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto;">
        <h1>Bienvenido al Sistema de Gestión de Inventarios</h1>
        <p class="login-sub">Ingresa sus credenciales para acceder al sistema</p>
        <form id="login-form" class="login-form-unique">
            <label for="login-email">Correo Electrónico</label>
            <input type="text" id="login-email" placeholder="correo@ejemplo.com" autocomplete="email">
            <span id="email-error"
                style="color:#dc3545;font-size:12px;margin-top:4px;display:none;text-align:left;"></span>
            <label for="login-password">Contraseña</label>
            <div class="password-field-container">
                <input type="password" id="login-password" placeholder="Contraseña">
                <button type="button" class="password-toggle-btn" id="login-password-toggle">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            <span id="password-error"
                style="color:#dc3545;font-size:12px;margin-top:4px;display:none;text-align:left;"></span>
            <button type="submit">Iniciar sesión</button>
        </form>

    </div>


    <script src="js/main.js"></script>
</body>

</html>
